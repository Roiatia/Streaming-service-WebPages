<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Flix</title>

    <style>
        body {
            margin: 0;
            background-color: #141414;
            font-family: Arial, sans-serif;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to right, #000000, #1c1c1c);
            padding: 15px 30px;
        }

        .left {
            display: flex;
            align-items: center;
        }

        .logo {
            color: #e50914;
            font-size: 26px;
            font-weight: bold;
            margin-right: 25px;
        }

        .nav-links a {
            color: #ccc;
            margin-right: 18px;
            text-decoration: none;
            font-size: 15px;
        }

        .nav-links a:hover {
            color: #fff;
        }

        .right {
            display: flex;
            gap: 15px;
        }

        .icon {
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="navbar">

        <div class="left">
            <div class="logo">Stream Flix</div>

            <div class="nav-links">
                <a href="#">Home</a>
                <a href="#">TV Shows</a>
                <a href="#">Movies</a>
                <a href="#">New & Popular</a>
                <a href="#">My List</a>
            </div>
        </div>

        <div class="right">
            <span class="icon">🔍</span>
            <span class="icon">🔔</span>
        </div>

    </div>

</body>
</html>
